<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RLSS Swimmer Profiles</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <p class="eyebrow">RLSS Speeds Archive</p>
      <h1>Swimmer Profile Search</h1>
      <p>Search by swimmer name and year to browse individual results without digging through old PDFs.</p>
    </section>

    <section class="panel filters">
      <div class="filter-grid">
        <label class="field">
          <span>Search swimmer</span>
          <input id="nameSearch" type="text" placeholder="e.g. Heather Watson" />
        </label>

        <label class="field">
          <span>Year</span>
          <select id="yearFilter">
            <option value="">All years</option>
          </select>
        </label>

        <button id="resetBtn" class="reset-btn" type="button">Reset</button>
      </div>

      <div class="summary-row">
        <div>
          <h2 id="profileTitle">Showing all swimmers</h2>
          <p id="profileHint">Type a swimmer name to narrow the archive.</p>
        </div>

        <div class="result-meta">
          <strong id="resultCount">0</strong>
          <span>results shown</span>
        </div>
      </div>
    </section>

    <section class="panel table-panel">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Year</th>
              <th>Event</th>
              <th>Age Group</th>
              <th>Name</th>
              <th>Club</th>
              <th>Final Time</th>
            </tr>
          </thead>
          <tbody id="resultsBody"></tbody>
        </table>
      </div>

      <div class="pager">
        <button id="prevBtn" type="button">Previous</button>
        <span id="pageInfo">Page 1 of 1</span>
        <button id="nextBtn" type="button">Next</button>
      </div>
    </section>
  </main>

  <template id="rowTemplate">
    <tr>
      <td data-key="year"></td>
      <td data-key="event"></td>
      <td data-key="age_group"></td>
      <td data-key="name"></td>
      <td data-key="club"></td>
      <td data-key="final_time"></td>
    </tr>
  </template>

  <script src="script.js"></script>
</body>
</html>
